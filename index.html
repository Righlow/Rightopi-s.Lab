<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RIGHTOPIA — ASCII Intro</title>
<style>
  html,body{height:100%;margin:0;background:#000;overflow:hidden;font-family:monospace}
  #c{display:block;width:100vw;height:100vh;background:#000}
  #ui{position:fixed;left:12px;top:12px;z-index:20;display:flex;gap:8px;align-items:center}
  button{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#111;color:#eee;cursor:pointer}
  button:hover{background:#161616}
  #hint{position:fixed;left:12px;bottom:12px;color:#888;font-size:12px;z-index:20}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s ease}
</style>
</head>
<body>
<div id="ui">
  <button id="playPause">Pause (Space)</button>
  <button id="strike">Lightning (L / Click)</button>
  <button id="restart">Restart</button>
  <span style="color:#666">RIGHTOPIA • ASCII Cinematic</span>
</div>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hint">Click or press L for ⚡ • Move mouse to stir fragments • Space to pause/play • Restart to replay full sequence</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });
  const flash = document.getElementById('flash');

  // ----- WebAudio: epic cinematic thunder + low hum (no external assets) -----
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let ac;
  function initAudio(){
    if(ac) return;
    ac = new AudioContext();
    // ambient low hum
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 45; // sub-bass
    gain.gain.value = 0.02;
    osc.connect(gain).connect(ac.destination);
    osc.start();
  }
  function thunder(){
    if(!ac) return;
    const noiseBuf = ac.createBuffer(1, ac.sampleRate*2, ac.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2.0); // decaying noise
    }
    const src = ac.createBufferSource();
    src.buffer = noiseBuf;
    const biquad = ac.createBiquadFilter();
    biquad.type = 'lowpass'; biquad.frequency.value = 400;
    const g = ac.createGain(); g.gain.value = 0.7;
    src.connect(biquad).connect(g).connect(ac.destination);
    src.start();
  }
  window.addEventListener('pointerdown', initAudio, { once:true });

  // ----- Setup & assets -----
  let W = innerWidth, H = innerHeight;
  canvas.width = W; canvas.height = H;

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  const img = new Image();
  img.onload = () => { prepareGrid(); startSequence(); };
  img.src = 'rt.svg'; // placed next to index.html

  // ----- Parameters -----
  let cellSize = 7; // high density (smaller -> denser)
  const CHARSET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@#%*+=-:.";
  const RED_CHARS   = "R8A#MW0@%&";
  const GREEN_CHARS = "GHB8MW&%#";
  const YELLOW_CHARS= "IL1/\\|*";
  const DARK_CHARS  = "MW@#&%";
  const pick = s => s[Math.floor(Math.random()*s.length)];

  // ----- Grid derived from brand image -----
  let cells = []; // {c,r,char,cat,phase}
  let cols=0, rows=0, logoBounds=null;

  function classify(r,g,b,a){
    if(a<10) return 'bg';
    const R=r/255, G=g/255, B=b/255;
    if (R>0.92 && G>0.92 && B>0.92) return 'bg'; // white background
    if (R>0.8 && G>0.7 && B<0.35) return 'yellow'; // bolt
    if (R>0.5 && G<0.35 && B<0.35) return 'red';
    if (G>0.45 && R<0.55 && B<0.45) return 'green';
    if ((R+G+B)/3 < 0.2) return 'dark';
    return (R>G) ? 'red' : 'green';
  }

  function prepareGrid(){
    // fit logo to 70% of viewport
    const tw = Math.floor(W*0.7), th = Math.floor(H*0.7);
    off.width = tw; off.height = th;
    offCtx.clearRect(0,0,tw,th);
    // draw centered
    // measure image natural size
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    const s = Math.min(tw/iw, th/ih);
    const dw = Math.floor(iw*s), dh = Math.floor(ih*s);
    const dx = Math.floor((tw-dw)/2), dy = Math.floor((th-dh)/2);
    offCtx.drawImage(img, dx, dy, dw, dh);

    // compute bounds of non-bg for bolt path and centering
    const data = offCtx.getImageData(0,0,tw,th);
    const pix = data.data;
    let minX=tw, minY=th, maxX=0, maxY=0;
    for(let y=0;y<th;y+=3){
      for(let x=0;x<tw;x+=3){
        const i=(y*tw+x)*4;
        const cat = classify(pix[i],pix[i+1],pix[i+2],pix[i+3]);
        if(cat!=='bg'){
          if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;
        }
      }
    }
    logoBounds = {x:minX,y:minY,w:maxX-minX,h:maxY-minY};

    cols = Math.max(1, Math.floor(tw / cellSize));
    rows = Math.max(1, Math.floor(th / cellSize));
    cells = [];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const sx = Math.min(tw-1, c*cellSize + (cellSize>>1));
        const sy = Math.min(th-1, r*cellSize + (cellSize>>1));
        const i=(sy*tw+sx)*4;
        const R=pix[i],G=pix[i+1],B=pix[i+2],A=pix[i+3];
        const cat = classify(R,G,B,A);
        if (cat==='bg') continue;
        let pool = DARK_CHARS;
        if (cat==='red') pool = RED_CHARS;
        else if (cat==='green') pool = GREEN_CHARS;
        else if (cat==='yellow') pool = YELLOW_CHARS;
        const ch = pick(pool);
        cells.push({c,r,char:ch,cat,phase:Math.random()*Math.PI*2, vx:0, vy:0, alive:true});
      }
    }
    // set font
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = Math.floor(cellSize*1.05) + 'px monospace';
  }

  // ----- Lightning bolt -----
  function makeBolt(){
    if(!logoBounds) return [];
    const segs = [];
    // start near top of logo, end near bottom
    let x = (W - cols*cellSize)/2 + (logoBounds.x + 5);
    let y = (H - rows*cellSize)/2 + (logoBounds.y + 5);
    const endY = (H - rows*cellSize)/2 + (logoBounds.y + logoBounds.h - 5);
    while(y < endY){
      segs.push({x, y, ch: pick(YELLOW_CHARS)});
      x += (Math.random()<0.5?-1:1) * (cellSize * (0.8+Math.random()*0.6));
      y += (cellSize * (0.8+Math.random()*0.9));
    }
    return segs;
  }

  // ----- Scenes state -----
  let running=true;
  let scene='bounce'; // bounce -> strike -> explode -> slogan
  let tScene=0;
  let bolt=[], boltTime=0;
  let fragments=[]; // after explode: {x,y,vx,vy,ch,cat,life}
  let sloganAlpha=0;
  let mx=W/2, my=H/2; // mouse
  window.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });

  function startSequence(){
    running=true; scene='bounce'; tScene=0; bolt=[]; boltTime=0; fragments=[]; sloganAlpha=0;
  }

  // ----- Controls -----
  document.getElementById('playPause').onclick = ()=>{ running = !running; document.getElementById('playPause').textContent = running?'Pause (Space)':'Play (Space)'; };
  document.getElementById('strike').onclick = doStrike;
  document.getElementById('restart').onclick = startSequence;
  window.addEventListener('keydown', e=>{
    if(e.key===' '){ e.preventDefault(); document.getElementById('playPause').click(); }
    if(e.key.toLowerCase()==='l'){ doStrike(); }
    if(e.key.toLowerCase()==='r'){ startSequence(); }
  });
  canvas.addEventListener('click', doStrike);

  function doStrike(){
    if(scene==='explode' || scene==='slogan') return;
    // jump to strike scene
    scene='strike'; tScene=0; bolt = makeBolt(); boltTime=0;
    flash.style.opacity = 1; setTimeout(()=> flash.style.opacity=0, 100);
    thunder();
  }

  // ----- Animation loop -----
  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now-last)/1000); last = now;
    if(!running){ requestAnimationFrame(loop); return; }

    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

    if(scene==='bounce'){
      tScene += dt;
      renderLogoBounce(now);
      // auto progress after 2.2s
      if(tScene>2.2){ doStrike(); }
    }
    else if(scene==='strike'){
      tScene += dt; boltTime += dt;
      renderLogoShock(now);
      renderBolt();
      if(tScene>0.4){
        // transition to explode
        toFragments();
        scene='explode'; tScene=0;
      }
    }
    else if(scene==='explode'){
      tScene += dt;
      updateFragments(dt);
      renderFragments();
      if(tScene>3.0){
        scene='slogan'; tScene=0;
      }
    }
    else if(scene==='slogan'){
      updateFragments(dt);
      renderFragmentsFaded();
      renderSlogan(dt);
    }

    requestAnimationFrame(loop);
  }

  function renderLogoBounce(now){
    // center offsets
    const compW = cols*cellSize, compH = rows*cellSize;
    const ox = (W - compW)/2, oy = (H - compH)/2;
    const t = now/1000;
    const pulse = 1 + Math.sin(t*3.0)*0.08;
    const bounce = Math.sin(t*2.2)*8;

    for(const cell of cells){
      const x = ox + cell.c*cellSize + cellSize/2;
      const wave = Math.sin(t*5 + cell.c*0.35 + cell.phase) * 1.4;
      const y = oy + cell.r*cellSize + cellSize/2 + wave + bounce;
      if(Math.random()<0.002){ // churn
        const pool = cell.cat==='red'?RED_CHARS:cell.cat==='green'?GREEN_CHARS:cell.cat==='yellow'?YELLOW_CHARS:DARK_CHARS;
        cell.char = pick(pool);
      }
      let fill = '#6B8E23';
      if(cell.cat==='red') fill='#E74C3C';
      else if(cell.cat==='green') fill='#6B8E23';
      else if(cell.cat==='yellow') fill='#F4D03F';
      else if(cell.cat==='dark') fill='#dddddd';
      ctx.fillStyle = fill;
      ctx.save(); ctx.translate(x,y); ctx.scale(pulse,pulse); ctx.fillText(cell.char,0,0); ctx.restore();
    }
  }

  function renderLogoShock(now){
    // like bounce but brighter & slight jitter
    const compW = cols*cellSize, compH = rows*cellSize;
    const ox = (W - compW)/2, oy = (H - compH)/2;
    const t = now/1000;
    const pulse = 1.15 + Math.sin(t*20.0)*0.06;
    const jitter = 1.5;

    for(const cell of cells){
      const x = ox + cell.c*cellSize + cellSize/2 + (Math.random()-0.5)*jitter;
      const y = oy + cell.r*cellSize + cellSize/2 + (Math.random()-0.5)*jitter;
      let fill = '#EC7063';
      if(cell.cat==='green') fill='#82A840';
      else if(cell.cat==='yellow') fill='#F7DC6F';
      else if(cell.cat==='dark') fill='#eeeeee';
      ctx.fillStyle = fill;
      ctx.save(); ctx.translate(x,y); ctx.scale(pulse,pulse); ctx.fillText(cell.char,0,0); ctx.restore();
    }
  }

  function renderBolt(){
    if(!bolt) return;
    ctx.fillStyle = '#F4D03F';
    ctx.globalAlpha = 0.95;
    for(const s of bolt){
      ctx.fillText(pick(YELLOW_CHARS), s.x + (Math.random()-0.5)*2, s.y + (Math.random()-0.5)*2);
    }
    ctx.globalAlpha = 1;
  }

  function toFragments(){
    fragments = [];
    const compW = cols*cellSize, compH = rows*cellSize;
    const ox = (W - compW)/2, oy = (H - compH)/2;
    for(const cell of cells){
      const x = ox + cell.c*cellSize + cellSize/2;
      const y = oy + cell.r*cellSize + cellSize/2;
      // initial velocity away from center, with randomness
      const cx = W/2, cy = H/2;
      const ang = Math.atan2(y-cy, x-cx);
      const spd = 80 + Math.random()*260;
      const vx = Math.cos(ang) * spd * (0.6+Math.random()*0.7);
      const vy = Math.sin(ang) * spd * (0.6+Math.random()*0.7);
      fragments.push({x,y,vx,vy,char:cell.char,cat:cell.cat,life:1,spin:(Math.random()-0.5)*0.8});
    }
  }

  function updateFragments(dt){
    const drag = 0.96;
    for(const f of fragments){
      // mouse repulsion
      const dx = f.x - mx, dy = f.y - my;
      const d2 = dx*dx + dy*dy;
      if(d2 < 16000){ // within 126px
        const d = Math.sqrt(d2) + 0.0001;
        const force = 1400 / d2;
        f.vx += (dx/d)*force*dt;
        f.vy += (dy/d)*force*dt;
      }

      f.x += f.vx*dt;
      f.y += f.vy*dt;
      f.vx *= drag; f.vy *= drag;
      f.life -= dt*0.22;
    }
    // remove dead
    fragments = fragments.filter(f => f.life > 0);
  }

  function renderFragments(){
    for(const f of fragments){
      let col = '#6B8E23';
      if(f.cat==='red') col='#E74C3C';
      else if(f.cat==='yellow') col='#F4D03F';
      else if(f.cat==='dark') col='#bbbbbb';
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = col;
      ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.spin); ctx.fillText(f.char, 0, 0); ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function renderFragmentsFaded(){
    for(const f of fragments){
      let col = '#82A840';
      if(f.cat==='red') col='#EC7063';
      else if(f.cat==='yellow') col='#F7DC6F';
      else if(f.cat==='dark') col='#999999';
      ctx.globalAlpha = Math.max(0, f.life*0.5);
      ctx.fillStyle = col;
      ctx.fillText(f.char, f.x, f.y);
    }
    ctx.globalAlpha = 1;
  }

  function renderSlogan(dt){
    sloganAlpha = Math.min(1, sloganAlpha + dt*0.6);
    const text = "COMPUTING IN MOTION";
    ctx.save();
    ctx.globalAlpha = sloganAlpha;
    ctx.fillStyle = '#e7e7e7';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, W/2, H*0.78);
    ctx.restore();
    // reset font for fragments if loop continues
    ctx.font = Math.floor(cellSize*1.05) + 'px monospace';
  }

  function start(){ requestAnimationFrame(loop); }

  function startSequence(){ // redefined to also start loop if needed
    running=true; scene='bounce'; tScene=0; bolt=[]; boltTime=0; fragments=[]; sloganAlpha=0;
    ctx.font = Math.floor(cellSize*1.05) + 'px monospace';
    requestAnimationFrame(loop);
  }

  // Handle resize
  addEventListener('resize', ()=>{
    W = innerWidth; H = innerHeight;
    canvas.width = W; canvas.height = H;
    prepareGrid();
  });

})();
</script>
</body>
</html>
